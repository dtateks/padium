name: Release macOS bundle

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    env:
      ASSET_NAME: Padium-macos.zip
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Resolve release tag and reuse state
        id: plan
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          short_sha="${GITHUB_SHA::7}"
          local_tag="local-${short_sha}"
          reuse_local="false"

          if gh release view "$local_tag" >/dev/null 2>&1; then
            for attempt in $(seq 1 12); do
              if gh release view "$local_tag" --json assets -q '.assets[].name' 2>/dev/null | grep -qx "$ASSET_NAME"; then
                reuse_local="true"
                break
              fi
              sleep 5
            done
          fi

          if [[ "$reuse_local" == "true" ]]; then
            echo "release_tag=$local_tag" >> "$GITHUB_OUTPUT"
            echo "skip_build=true" >> "$GITHUB_OUTPUT"
          else
            echo "release_tag=main-${GITHUB_RUN_NUMBER}-${short_sha}" >> "$GITHUB_OUTPUT"
            echo "skip_build=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build universal Padium.app and zip
        if: steps.plan.outputs.skip_build == 'false'
        run: bash scripts/build-release.sh "$ASSET_NAME"

      - name: Promote cache release to latest
        if: steps.plan.outputs.skip_build == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit "${{ steps.plan.outputs.release_tag }}" --latest

      - name: Publish release asset
        if: steps.plan.outputs.skip_build == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.plan.outputs.release_tag }}
          target_commitish: ${{ github.sha }}
          prerelease: false
          make_latest: true
          files: ${{ env.ASSET_NAME }}
